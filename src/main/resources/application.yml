spring:
  application:
    name: xiangzi-ai-agent
  profiles:
    active: local

server:
  port: 8123
  servlet:
    context-path: /api # 上下文路径


# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    # 扫描接口包的路径
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xiangzi.xiangziaiagent.controller
# knife4j
knife4j:
  enable: true  # 开启增强功能
  production: false  # 测试环境设为false，生产环境建议设为true避免泄露
  setting:
    language: zh_CN  # 中文界面



logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug